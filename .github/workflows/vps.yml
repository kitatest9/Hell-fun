name: vps-immortal-pro

on:
  workflow_dispatch:
  repository_dispatch:

concurrency:
  group: marin-vps
  cancel-in-progress: true

permissions:
  actions: write
  contents: write

env:
  TZ: 'Asia/Kolkata'

jobs:
  ultimate-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: 📂 Checkout Code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GH_TOKEN }}
        fetch-depth: 0

    - name: 🧹 System Cleanup & Install Tools
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg imagemagick webp jq tmate ttyd btop
        sudo npm install -g pm2
        curl -fsSL https://raw.githubusercontent.com | sudo bash

    - name: 💾 Setup PERMANENT SaveCode (No Hiding)
      run: |
        git config --global user.email "marin-bot@auto.sync"
        git config --global user.name "Marin Auto-Saver"
        # Token based remote set-up
        git remote set-url origin https://${{ secrets.GH_TOKEN }}@://github.com{{ github.repository }}.git
        
        # Fixed SaveCode: No moving .github, only pushing data
        echo '#!/bin/bash
        echo "⏳ Saving ALL BOTS to GitHub..."
        git add .
        # .github ko ignore nahi karega lekin usay move bhi nahi karega
        git commit -m "💾 Auto-saved Multi-Bot Empire [skip ci]" || echo "No changes to save."
        git push origin HEAD || echo "⚠️ Push failed! Check GH_TOKEN secret."
        echo "✅ Save Process Completed!"' > savecode
        
        sudo mv savecode /usr/local/bin/savecode
        sudo chmod +x /usr/local/bin/savecode

    - name: 🚀 Auto-Detect & Start All Bots (PM2)
      env:
        MONGODB: ${{ secrets.MONGODB }}
        SESSION_ID: ${{ secrets.SESSION_ID }}
      run: |
        for dir in */ ; do
          if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
            BOT_NAME=$(basename "$dir")
            cd "$dir" && npm install
            if [ -f "index.js" ]; then pm2 start index.js --name "$BOT_NAME"; else pm2 start npm --name "$BOT_NAME" -- start; fi
            cd ..
          fi
        done
        pm2 save

    - name: 🌐 Start Dashboards & Life Loop
      run: |
        filebrowser -a 0.0.0.0 -p 8080 -r . --noauth > /dev/null 2>&1 &
        ttyd -R -p 61208 btop > /dev/null 2>&1 &
        
        # Tmate SSH Session
        tmate -S /tmp/tmate.sock new-session -d
        tmate -S /tmp/tmate.sock wait tmate-ready
        echo "💻 SSH LINK: $(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')"
        
        echo "RESTART_SAFE=true" >> $GITHUB_ENV
        
        # Life timer: 5.5 hours tak chalega phir auto-save karke band hoga
        sleep 20500 
        savecode

    - name: 🧟 Respawn Zombie (Auto-Restart)
      if: always()
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GH_TOKEN }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'vps.yml',
            ref: 'main'
          })
          
